name: Generate Snake

on:
  schedule:
    - cron: "0 2 * * *" # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: chrisrobison
          outputs: |
            dist/github-snake.svg?color_snake=#00ff66&color_dots=#0a0f14,#00ff66,#00cc55,#00aa44,#007733
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00ff66&color_dots=#0a0f14,#00ff66,#00cc55,#00aa44,#007733
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
